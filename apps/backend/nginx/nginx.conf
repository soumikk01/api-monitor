# ─────────────────────────────────────────────────────────────────────────────
# NGINX Load Balancer Config
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zone ───────────────────────────────────────────────────────
# 10m = 10MB shared memory (~160k IP entries)
# 10r/s = 10 requests/second per IP at the NGINX layer
# (NestJS ThrottlerModule also applies 200 req/60s — defence in depth)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ── Upstream — 2 NestJS instances ────────────────────────────────────────────
upstream nestjs_api {
  # ip_hash = sticky sessions — same client IP always hits the same backend.
  # Important for WebSocket stability even with the Redis adapter.
  ip_hash;

  server nestjs_1:4000 max_fails=3 fail_timeout=30s;
  server nestjs_2:4000 max_fails=3 fail_timeout=30s;

  keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

# ── Main server block ─────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name api.yourdomain.com;

  ssl_certificate     /etc/ssl/certs/api-monitor.crt;
  ssl_certificate_key /etc/ssl/private/api-monitor.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;

  # ── Security headers ───────────────────────────────────────────────────────
  add_header X-Frame-Options           DENY;
  add_header X-Content-Type-Options    nosniff;
  add_header X-XSS-Protection         "1; mode=block";
  add_header Referrer-Policy           strict-origin-when-cross-origin;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

  # ── Timeouts ───────────────────────────────────────────────────────────────
  proxy_connect_timeout  10s;
  proxy_read_timeout     60s;
  proxy_send_timeout     60s;
  client_max_body_size   2m;

  # ── Health check — no rate limit, no auth ─────────────────────────────────
  location = /health {
    proxy_pass         http://nestjs_api;
    proxy_http_version 1.1;
    access_log         off;
  }

  # ── WebSocket — Socket.io (/socket.io/) ──────────────────────────────────
  # Standard Socket.io path — no rate limit (connections are long-lived)
  location /socket.io/ {
    proxy_pass         http://nestjs_api;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "Upgrade";
    proxy_set_header   Host               $host;
    proxy_set_header   X-Real-IP          $remote_addr;
    proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto  $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # ── REST API (/api/*) — rate limited ─────────────────────────────────────
  location /api/ {
    # burst=20: allow spikes up to 20 requests above the 10r/s rate
    # nodelay: serve burst requests immediately (no queuing)
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;

    proxy_pass         http://nestjs_api;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering    off;
    proxy_cache_bypass $http_upgrade;
  }

  location / {
    return 404;
  }
}
